<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Assets Ecosystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; border: none; background: none; cursor: pointer; }
    a { text-decoration: none; }

    /* ─── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* ─── Base ────────────────────────────────────────────── */
    html { font-size: 16px; }
    body {
      background: #0B1628;
      color: #F0F4FF;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ──────────────────────────────────────────── */
    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ─── View system ─────────────────────────────────────── */
    .view {
      display: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .view.active  { display: block; }
    .view.visible { opacity: 1; }

    /* ─── Typography ──────────────────────────────────────── */
    .t-display {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.12;
      letter-spacing: -0.01em;
    }
    .t-section {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 600;
      color: #FFFFFF;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .t-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B8CAE;
    }
    .t-muted {
      color: #6B8CAE;
    }
    .t-white {
      color: #FFFFFF;
    }

    /* ─── Back link ───────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: #6B8CAE;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: color 0.15s;
    }
    .back-link:hover { color: #F0F4FF; }

    /* ═══════════════════════════════════════════════════════
       LEVEL 1 — LANDING
    ═══════════════════════════════════════════════════════ */
    #view-landing { padding: 4.5rem 0 6rem; }

    .landing-header { margin-bottom: 1.25rem; }
    .landing-header .t-label { display: block; margin-bottom: 1.25rem; }

    .landing-rule {
      margin-top: 1.25rem;
      height: 1px;
      background: #FFFFFF;
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }

    .landing-subtitle {
      font-weight: 300;
      font-size: 1rem;
      color: #6B8CAE;
      margin-top: 1rem;
      max-width: 520px;
      line-height: 1.65;
    }

    /* Layer grid */
    .layer-grid {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      padding: 0 2rem;
    }

    .layer-card {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      padding: 1.75rem 1.5rem;
      background: #0B1628;
      border: 1px solid #1E3A5F;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .layer-card:hover { border-color: #2e5080; }
    .layer-card:hover .layer-card__name { color: #FFFFFF; }

    .layer-card__num {
      font-size: 0.68rem;
      font-weight: 500;
      color: #6B8CAE;
      letter-spacing: 0.06em;
      min-width: 1.5rem;
      flex-shrink: 0;
      padding-top: 0.1rem;
    }
    .layer-card__content { flex: 1; min-width: 0; }
    .layer-card__name {
      font-weight: 600;
      font-size: 1rem;
      color: #F0F4FF;
      transition: color 0.15s;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }
    .layer-card__preview {
      font-size: 0.78rem;
      color: #6B8CAE;
      font-style: italic;
      line-height: 1.5;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 2.5rem;
    }
    .search-input {
      width: 100%;
      background: #0d1f3c;
      border: 1px solid #1E3A5F;
      border-radius: 4px;
      color: #F0F4FF;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 0.45rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: #4a6a88; }
    .search-input:focus { border-color: #2e5080; }
    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #112240;
      border: 1px solid #1E3A5F;
      border-radius: 4px;
      list-style: none;
      max-height: 380px;
      overflow-y: auto;
      z-index: 100;
    }
    .search-results.open { display: block; }
    .search-result {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #1a2f4a;
      transition: background 0.12s;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #152d4e; }
    .search-result__name {
      font-size: 0.875rem;
      font-weight: 500;
      color: #F0F4FF;
      line-height: 1.3;
    }
    .search-result__layer {
      font-size: 0.72rem;
      color: #6B8CAE;
      margin-top: 0.2rem;
    }
    .search-no-results {
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: #4a6a88;
      font-style: italic;
      list-style: none;
    }

    /* ── Landing nav bar ── */
    .landing-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .landing-nav__views {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .landing-nav__view {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #4a6a88;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }
    .landing-nav__view:hover { color: #a8bdd0; }
    .landing-nav__view.active { color: #FFFFFF; }
    .landing-nav__dot {
      font-size: 0.68rem;
      color: #4a6a88;
      line-height: 1;
      user-select: none;
    }
    /* Search constrained inside nav */
    .landing-nav .search-wrap {
      width: 300px;
      margin-bottom: 0;
    }

    .landing-footer {
      margin-top: 3.5rem;
      padding-top: 1.75rem;
      border-top: 1px solid #1E3A5F;
    }
    .landing-footer p {
      font-size: 0.73rem;
      color: #6B8CAE;
    }

    /* ── Coverage Map ── */
    .coverage-wrap {
      overflow-x: auto;
      margin-bottom: 2.5rem;
    }
    .coverage-table {
      border-collapse: collapse;
      min-width: 640px;
      width: 100%;
      table-layout: fixed;
    }
    .coverage-table thead th {
      position: sticky;
      top: 0;
      background: #0B1628;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6B8CAE;
      padding: 0.55rem 0.4rem 0.7rem;
      text-align: center;
      border-bottom: 1px solid #1E3A5F;
      z-index: 2;
      white-space: nowrap;
    }
    .coverage-table thead th.coverage-name-col {
      text-align: left;
      width: 170px;
      padding-left: 0;
    }
    .coverage-group-row { cursor: pointer; }
    .coverage-group-row td {
      border-bottom: 1px solid #0f1e32;
      padding: 1.1rem 0.4rem 0.45rem;
    }
    .coverage-group-row td:first-child { padding-left: 0; }
    .coverage-group-name-inner {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .coverage-chevron {
      font-size: 0.75rem;
      color: #3a5570;
      display: inline-block;
      transition: transform 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .coverage-group-row.is-expanded .coverage-chevron { transform: rotate(90deg); }
    .coverage-group-label-text {
      font-size: 0.57rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3a5570;
      transition: color 0.12s;
    }
    .coverage-group-row:hover .coverage-group-label-text { color: #6B8CAE; }
    .coverage-group-summary {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: none;
      color: #1f3348;
      margin-left: auto;
      white-space: nowrap;
    }
    .coverage-agg-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(147, 180, 212, 0.45);
      vertical-align: middle;
      transition: opacity 0.12s;
    }
    .coverage-group-row.is-expanded .coverage-agg-dot { opacity: 0; }
    .coverage-company-row { display: none; }
    .coverage-company-row.is-expanded { display: table-row; }
    .coverage-row td {
      border-bottom: 1px solid #0d1b2c;
      padding: 0.42rem 0.4rem;
    }
    .coverage-controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
    }
    .coverage-toggle-all {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      color: #2a4060;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.12s;
      padding: 0;
    }
    .coverage-toggle-all:hover { color: #8aa8c4; }
    .coverage-name-cell { padding-left: 0 !important; }
    .coverage-name-btn {
      font-size: 0.75rem;
      font-weight: 400;
      color: #8aa8c4;
      cursor: pointer;
      text-align: left;
      transition: color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      display: block;
    }
    .coverage-name-btn:hover { color: #F0F4FF; }
    .coverage-cell { text-align: center; }
    .coverage-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .coverage-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1E3A5F;
      margin-bottom: 1rem;
    }
    .coverage-legend-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.67rem;
      color: #6B8CAE;
      letter-spacing: 0.03em;
    }
    .coverage-legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════
       LEVEL 2 — LAYER
    ═══════════════════════════════════════════════════════ */
    #view-layer { padding: 3rem 0 6rem; }

    .layer-page-header { margin-bottom: 0; }
    .layer-page-header .back-link { margin-bottom: 2rem; display: block; }

    .layer-heading-row {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .layer-count {
      font-size: 0.75rem;
      font-weight: 400;
      color: #6B8CAE;
      white-space: nowrap;
    }

    .layer-page-desc {
      font-weight: 300;
      font-size: 0.95rem;
      color: #6B8CAE;
      margin-top: 0.75rem;
      max-width: 620px;
      line-height: 1.65;
    }

    /* Filter pills */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin: 2rem 0 2.25rem;
    }
    .filter-pill {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      border: 1px solid #1E3A5F;
      background: transparent;
      color: #6B8CAE;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .filter-pill:hover {
      border-color: #F0F4FF;
      color: #F0F4FF;
    }
    .filter-pill.active {
      border-color: #FFFFFF;
      color: #FFFFFF;
      background: #112240;
    }

    /* Company grid */
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: #1E3A5F;
    }
    .company-grid--empty {
      background: transparent;
    }
    .company-card {
      background: #112240;
      padding: 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .company-card:hover { background: #152d4e; }

    .company-card__name {
      font-weight: 600;
      font-size: 1rem;
      color: #FFFFFF;
      margin-bottom: 0.3rem;
      line-height: 1.3;
    }
    .company-card__status {
      font-size: 0.71rem;
      color: #6B8CAE;
      margin-bottom: 0.45rem;
    }
    .company-card__location {
      font-size: 0.75rem;
      color: #6B8CAE;
      margin-bottom: 0.7rem;
    }
    .company-card__badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border: 1px solid #FFFFFF;
      color: #FFFFFF;
      border-radius: 2px;
      margin-bottom: 0.8rem;
    }
    .company-card__differentiator {
      font-size: 0.8rem;
      color: #F0F4FF;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.6;
      margin-bottom: 0.65rem;
    }
    .company-card__risk {
      font-size: 0.74rem;
      font-style: italic;
      color: #a05858;
      line-height: 1.5;
      margin-bottom: 0.55rem;
    }
    .company-card__strategic {
      font-size: 0.74rem;
      color: #6B8CAE;
      line-height: 1.5;
    }

    .empty-state {
      padding: 2.5rem 0;
      font-size: 0.83rem;
      color: #6B8CAE;
    }

    /* ═══════════════════════════════════════════════════════
       LEVEL 3 — COMPANY PROFILE
    ═══════════════════════════════════════════════════════ */
    #view-company { padding: 2.5rem 0 7rem; }

    /* Shared section rhythm */
    .prof-section {
      padding: 2.75rem 0;
      border-top: 1px solid #1E3A5F;
    }
    .prof-section-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6B8CAE;
      margin-bottom: 0.75rem;
    }

    /* ── 1. Header ── */
    .prof-back { display: block; margin-bottom: 2.25rem; }

    .prof-layer-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6B8CAE;
      margin-bottom: 0.9rem;
    }
    .prof-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .prof-header-left {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .prof-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.08;
    }
    .prof-ticker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 0.22rem 0.6rem;
      border: 1px solid #6B8CAE;
      color: #6B8CAE;
      border-radius: 2px;
      white-space: nowrap;
      align-self: center;
    }
    .prof-header-right { text-align: right; flex-shrink: 0; padding-top: 0.4rem; }
    .prof-status {
      font-size: 0.78rem;
      color: #F0F4FF;
      font-weight: 500;
    }

    /* ── Live stock price badge ── */
    .prof-price-badge {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
      margin-top: 0.5rem;
    }
    .prof-price-badge--visible { display: flex; }
    .prof-price-main {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .prof-price-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3ecf8e;
      flex-shrink: 0;
      animation: price-pulse 2.2s ease-in-out infinite;
    }
    .prof-price-dot--stale {
      background: #4a6a88;
      animation: none;
    }
    @keyframes price-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .prof-price-ticker {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #6B8CAE;
    }
    .prof-price-value {
      font-size: 0.82rem;
      font-weight: 600;
      color: #F0F4FF;
    }
    .prof-price-change {
      font-size: 0.75rem;
      font-weight: 500;
    }
    .prof-price--up        { color: #3ecf8e; }
    .prof-price--down      { color: #e05c5c; }
    .prof-price-unavailable {
      font-size: 0.72rem;
      font-style: italic;
      color: #4a6a88;
    }
    .prof-price-timestamp {
      font-size: 0.6rem;
      color: #4a6a88;
      letter-spacing: 0.01em;
    }

    /* Funding badges row — below name */
    .prof-funding-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }
    .prof-funding-badge__label {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #6B8CAE;
      margin-bottom: 0.25rem;
    }
    .prof-funding-badge__value {
      font-size: 0.85rem;
      font-weight: 500;
      color: #F0F4FF;
    }

    /* ── 2. Key Differentiator — hero ── */
    .prof-differentiator {
      padding: 3rem 0;
      border-top: 1px solid #1E3A5F;
    }
    .prof-differentiator__text {
      font-size: clamp(1.05rem, 2vw, 1.22rem);
      color: #F0F4FF;
      line-height: 1.78;
      max-width: 860px;
    }

    /* ── 3. Two-col: Client Profile | Competitive Position ── */
    .prof-two-col {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 4rem;
      padding: 2.75rem 0;
      border-top: 1px solid #1E3A5F;
      align-items: start;
    }
    .prof-two-col__value {
      font-size: 0.875rem;
      color: #a8bdd0;
      line-height: 1.72;
    }
    .prof-position-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1px solid #FFFFFF;
      color: #FFFFFF;
      border-radius: 2px;
      margin-top: 0.25rem;
    }

    /* ── Competitive position info icon + tooltip ── */
    .position-info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid #4a6a88;
      font-size: 0.55rem;
      font-style: italic;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      color: #4a6a88;
      cursor: default;
      position: relative;
      margin-left: 0.4rem;
      vertical-align: middle;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1;
      flex-shrink: 0;
    }
    .position-info-icon .position-tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 7px);
      left: 50%;
      transform: translateX(-50%);
      background: #1E3A5F;
      color: #D0DCEB;
      font-size: 0.76rem;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
      text-transform: none;
      line-height: 1.6;
      padding: 0.7rem 0.9rem;
      border-radius: 6px;
      width: 270px;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 20;
    }
    .position-info-icon:hover .position-tooltip {
      visibility: visible;
      opacity: 1;
    }

    /* ── 4. Three-col: HQ | Coverage | Founded ── */
    .prof-three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.5rem;
      padding: 2.75rem 0;
      border-top: 1px solid #1E3A5F;
    }
    .prof-three-col__label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #6B8CAE;
      margin-bottom: 0.5rem;
    }
    .prof-three-col__value {
      font-size: 0.875rem;
      color: #F0F4FF;
      line-height: 1.55;
    }

    /* ── 5. Regulatory Status / full-width sections ── */
    .prof-full {
      padding: 2.75rem 0;
      border-top: 1px solid #1E3A5F;
    }
    .prof-full__value {
      font-size: 0.838rem;
      color: #a8bdd0;
      line-height: 1.72;
      max-width: 820px;
    }

    /* ── 5b. Issued Assets ── */
    .prof-assets-explainer {
      font-size: 0.78rem;
      color: #6B8CAE;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 1.1rem;
    }
    .prof-asset-row {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.7rem 0;
    }
    .prof-asset-row + .prof-asset-row {
      border-top: 1px solid #142035;
    }
    .prof-asset-symbol {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #a8bdd0;
      border: 1px solid #2a4a6a;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      white-space: nowrap;
      margin-top: 0.18rem;
      flex-shrink: 0;
    }
    .prof-asset-body { flex: 1; }
    .prof-asset-name-row {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .prof-asset-name {
      font-size: 0.855rem;
      font-weight: 500;
      color: #F0F4FF;
      line-height: 1.35;
    }
    .prof-asset-type {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #6B8CAE;
    }
    .prof-asset-note {
      font-size: 0.78rem;
      font-style: italic;
      color: #8aa8c4;
      line-height: 1.58;
      margin-top: 0.3rem;
    }
    .prof-assets-context {
      font-size: 0.78rem;
      font-style: italic;
      color: #6B8CAE;
      line-height: 1.65;
      margin-top: 1rem;
    }

    /* ── 6. Secondary layer pills ── */
    .prof-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.25rem;
    }
    .prof-pill {
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 0.22rem 0.75rem;
      border: 1px solid #1E3A5F;
      color: #6B8CAE;
      border-radius: 100px;
    }

    /* ── 7. Strategic Move ── */
    .prof-strategic__value {
      font-size: 0.865rem;
      color: #8aa8c4;
      line-height: 1.72;
      max-width: 820px;
    }

    /* ── 8. Risk Flags ── */
    .prof-risk {
      padding: 2.75rem 0 2.75rem 1.75rem;
      border-top: 1px solid #1E3A5F;
      border-left: 2px solid #b07d3a;
    }
    .prof-risk__label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #b07d3a;
      margin-bottom: 0.65rem;
    }
    .prof-risk__text {
      font-size: 0.855rem;
      color: #c4965a;
      line-height: 1.72;
      font-style: italic;
      max-width: 820px;
    }

    /* ── 9. Why This Matters ── */
    .prof-why {
      padding: 2.75rem 0 2.75rem 1.75rem;
      border-top: 1px solid #1E3A5F;
      border-left: 2px solid #3d6a9e;
    }
    .prof-why__row { margin-bottom: 1.25rem; }
    .prof-why__row:last-child { margin-bottom: 0; }
    .prof-why__audience {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7aafd4;
      margin-bottom: 0.3rem;
    }
    .prof-why__text {
      font-size: 0.875rem;
      color: #F0F4FF;
      line-height: 1.65;
      max-width: 820px;
    }

    /* ─── Responsive ──────────────────────────────────────── */
    @media (max-width: 780px) {
      .layer-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .container { padding: 0 1.25rem; }
      #view-landing { padding: 3rem 0 5rem; }
      .landing-header { margin-bottom: 2.5rem; }
      .layer-grid { grid-template-columns: 1fr; }
      .company-grid { grid-template-columns: 1fr; }
      .filter-row { gap: 0.4rem; }
      .prof-two-col { grid-template-columns: 1fr; gap: 2rem; }
      .prof-three-col { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
      .prof-name { font-size: 2rem; }
    }
    @media (max-width: 420px) {
      .prof-three-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 420px) {
      .t-display { font-size: 1.7rem; }
      .t-section { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ LEVEL 1: LANDING ══════════════════════════════════ -->
  <div id="view-landing" class="view">
    <div class="container">

      <header class="landing-header">
        <span class="t-label">Digital Assets Ecosystem</span>
        <h1 class="t-display">Infrastructure &amp; Competitive Intelligence</h1>
        <p class="landing-subtitle">Nine infrastructure layers. 61 companies. Built for institutional clarity.</p>
        <div class="landing-rule"></div>
      </header>

      <nav class="landing-nav">
        <div class="landing-nav__views">
          <button class="landing-nav__view active" data-view="index">Index</button>
          <span class="landing-nav__dot">·</span>
          <button class="landing-nav__view" data-view="coverage">Coverage Map</button>
        </div>
        <div class="search-wrap">
          <input type="text" id="company-search" class="search-input" placeholder="Search companies…" autocomplete="off" spellcheck="false" aria-label="Search companies">
          <ul id="search-results" class="search-results" role="listbox"></ul>
        </div>
      </nav>

      <ul class="layer-grid" id="layer-list" role="list" aria-label="Infrastructure layers"></ul>

      <div id="coverage-map" style="display:none">
        <div class="coverage-controls">
          <button class="coverage-toggle-all" id="coverage-toggle-all">Expand All</button>
        </div>
        <div class="coverage-wrap">
          <table class="coverage-table">
            <thead id="coverage-thead"></thead>
            <tbody id="coverage-tbody"></tbody>
          </table>
        </div>
        <div class="coverage-legend" id="coverage-legend"></div>
      </div>

      <footer class="landing-footer">
        <p>Data current as of Q1 2026. Valuation data pending verification.</p>
      </footer>

    </div>
  </div>

  <!-- ══ LEVEL 2: LAYER ════════════════════════════════════ -->
  <div id="view-layer" class="view">
    <div class="container">

      <div class="layer-page-header">
        <button class="back-link" id="back-to-landing" aria-label="Back to all layers">← All Layers</button>
        <div class="layer-heading-row">
          <h2 class="t-section" id="layer-heading"></h2>
          <span class="layer-count" id="layer-count"></span>
        </div>
        <p class="layer-page-desc" id="layer-description"></p>
      </div>

      <div class="filter-row" id="filter-row" role="group" aria-label="Filter companies">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="public">Public</button>
        <button class="filter-pill" data-filter="private">Private</button>
        <button class="filter-pill" data-filter="core">Core</button>
        <button class="filter-pill" data-filter="challenger">Challenger</button>
        <button class="filter-pill" data-filter="niche">Niche</button>
      </div>

      <div id="company-grid-wrapper"></div>

    </div>
  </div>

  <!-- ══ LEVEL 3: COMPANY PROFILE ═════════════════════════ -->
  <div id="view-company" class="view">
    <div class="container">
      <div id="profile-root"></div>
    </div>
  </div>

</div><!-- #app -->

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────
  let DATA = null;
  let currentLayer = null;
  const PRICE_CACHE = {}; // keyed by ticker; persists for the session

  // ── DOM refs ───────────────────────────────────────────────
  const views = {
    landing: document.getElementById('view-landing'),
    layer:   document.getElementById('view-layer'),
    company: document.getElementById('view-company'),
  };

  // ── View transitions ───────────────────────────────────────
  let transitionTimer = null;
  let _transitionGen  = 0;

  function showView(name) {
    clearTimeout(transitionTimer);
    var gen = ++_transitionGen;

    // Fade out all active views
    Object.values(views).forEach(function (el) {
      el.classList.remove('visible');
    });

    transitionTimer = setTimeout(function () {
      if (gen !== _transitionGen) return; // superseded by a later showView call
      Object.values(views).forEach(function (el) {
        el.classList.remove('active');
      });
      var target = views[name];
      target.classList.add('active');
      // Double rAF to ensure display:block has painted before opacity transition
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          if (gen !== _transitionGen) return; // superseded
          target.classList.add('visible');
        });
      });
      window.scrollTo({ top: 0, behavior: 'instant' });
    }, 180);
  }

  // ── Data fetch ─────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('./data/companies.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      DATA = await res.json();
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<div style="padding:4rem 2rem;color:#6B8CAE;font-family:Inter,sans-serif;font-size:0.9rem;">' +
        'Unable to load companies.json. Ensure the file is in the same directory as index.html.' +
        '</div>';
      return;
    }
    renderLanding();
    initSearch();
    showView('landing');
  }

  // ── Utilities ──────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function companiesForLayer(layerName) {
    return DATA.companies.filter(function (c) {
      return c.primary_layer === layerName;
    });
  }

  // ── LEVEL 1: Landing ───────────────────────────────────────
  function renderLanding() {
    var list = document.getElementById('layer-list');
    list.innerHTML = '';

    DATA.layers.forEach(function (layer, i) {
      var companies = companiesForLayer(layer.name);
      var previewNames = companies.slice(0, 3).map(function (c) { return c.company; });
      var remainder = companies.length - 3;
      var previewText = previewNames.join(', ');
      if (remainder > 0) previewText += ' and more';

      var li = document.createElement('li');
      li.className = 'layer-card';
      li.setAttribute('role', 'listitem');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', 'Navigate to ' + layer.name);
      li.innerHTML =
        '<span class="layer-card__num">' + pad(i + 1) + '</span>' +
        '<div class="layer-card__content">' +
          '<div class="layer-card__name">' + esc(layer.name) + '</div>' +
          '<div class="layer-card__preview">' + esc(previewText) + '</div>' +
        '</div>';

      li.addEventListener('click', function () { navigateToLayer(layer); });
      li.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigateToLayer(layer); }
      });
      list.appendChild(li);

    });
  }

  // ── Coverage Map data ──────────────────────────────────────
  var LAYER_ABBREVS = {
    'Custody & Wallet Management':      'CUST',
    'KYT / Compliance / AML':           'KYT',
    'Trading & Execution':              'TRAD',
    'Settlement':                       'SETL',
    'Reconciliation':                   'RECON',
    'Tokenization & Transfer Agent':    'TOKEN',
    'Stablecoin Infrastructure':        'STABLE',
    'Data & Reporting':                 'DATA',
    'Technology & Node Infrastructure': 'TECH',
  };

  var POSITION_COLORS = {
    'Core':                 '#F8F9FA',
    'Challenger':           '#93B4D4',
    'Niche':                '#5C7FA3',
    'Strategic Bet':        '#C9A84C',
    'Legacy Extending':     '#5A6472',
    'Prestige':             '#C9B96A',
    'Distressed':           '#2E3A47',
    'Geographic Specialist':'#6A9BAA',
  };

  var coverageBuilt = false;

  function renderCoverageMap() {
    if (coverageBuilt) return;
    coverageBuilt = true;

    var layers       = DATA.layers.map(function (l) { return l.name; });
    var thead        = document.getElementById('coverage-thead');
    var tbody        = document.getElementById('coverage-tbody');
    var legendEl     = document.getElementById('coverage-legend');
    var toggleAllBtn = document.getElementById('coverage-toggle-all');

    var groupRows      = [];
    var allCompanyRows = [];

    // ── Header row
    var hRow = document.createElement('tr');
    var nameHeader = document.createElement('th');
    nameHeader.className = 'coverage-name-col';
    hRow.appendChild(nameHeader);
    layers.forEach(function (layerName) {
      var th = document.createElement('th');
      th.textContent = LAYER_ABBREVS[layerName] || layerName;
      hRow.appendChild(th);
    });
    thead.appendChild(hRow);

    // ── Body: group companies by primary layer, in layer order
    layers.forEach(function (layerName) {
      var companies = DATA.companies.filter(function (c) { return c.primary_layer === layerName; });
      if (!companies.length) return;

      var multiLayerCount = companies.filter(function (c) {
        return c.secondary_layers && c.secondary_layers.trim().length > 0;
      }).length;
      var summary = companies.length + ' compan' + (companies.length === 1 ? 'y' : 'ies');
      if (multiLayerCount > 0) summary += ' · ' + multiLayerCount + ' touch multiple layers';

      // ── Group header row (collapsed by default)
      var groupRow = document.createElement('tr');
      groupRow.className = 'coverage-group-row';

      var nameCell = document.createElement('td');
      nameCell.className = 'coverage-name-cell';
      var nameInner = document.createElement('div');
      nameInner.className = 'coverage-group-name-inner';
      nameInner.innerHTML =
        '<span class="coverage-chevron">›</span>' +
        '<span class="coverage-group-label-text">' + layerName + '</span>' +
        '<span class="coverage-group-summary">' + summary + '</span>';
      nameCell.appendChild(nameInner);
      groupRow.appendChild(nameCell);

      layers.forEach(function (colLayer) {
        var cell = document.createElement('td');
        cell.className = 'coverage-cell';
        if (colLayer === layerName) {
          var aggDot = document.createElement('span');
          aggDot.className = 'coverage-agg-dot';
          cell.appendChild(aggDot);
        }
        groupRow.appendChild(cell);
      });

      tbody.appendChild(groupRow);
      groupRows.push(groupRow);

      // ── Company rows (hidden by default)
      var companyRows = [];
      companies.forEach(function (co) {
        var secondarySet = {};
        (co.secondary_layers || '').split(',').forEach(function (s) {
          secondarySet[s.trim()] = true;
        });
        var color = POSITION_COLORS[co.competitive_position] || '#4a6a88';

        var row = document.createElement('tr');
        row.className = 'coverage-row coverage-company-row';

        var rowNameCell = document.createElement('td');
        rowNameCell.className = 'coverage-name-cell';
        var btn = document.createElement('button');
        btn.className = 'coverage-name-btn';
        btn.textContent = co.company;
        btn.title = co.company;
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var layer = DATA.layers.find(function (l) { return l.name === co.primary_layer; });
          if (!layer) return;
          currentLayer = layer;
          layer.activeFilter = 'all';
          history.pushState({ view: 'layer', layerName: layer.name, filter: 'all' }, '');
          navigateToCompany(co);
        });
        rowNameCell.appendChild(btn);
        row.appendChild(rowNameCell);

        layers.forEach(function (colLayer) {
          var cell = document.createElement('td');
          cell.className = 'coverage-cell';
          var isPrimary   = co.primary_layer === colLayer;
          var isSecondary = !!secondarySet[colLayer];
          if (isPrimary || isSecondary) {
            var dot = document.createElement('span');
            dot.className = 'coverage-dot';
            dot.style.background = color;
            if (isSecondary && !isPrimary) dot.style.opacity = '0.55';
            cell.appendChild(dot);
          }
          row.appendChild(cell);
        });

        tbody.appendChild(row);
        companyRows.push(row);
        allCompanyRows.push(row);
      });

      // Toggle group on header click
      groupRow.addEventListener('click', function () {
        var isExpanded = groupRow.classList.toggle('is-expanded');
        companyRows.forEach(function (r) { r.classList.toggle('is-expanded', isExpanded); });
        updateToggleAllText();
      });
    });

    function updateToggleAllText() {
      var anyExpanded = groupRows.some(function (r) { return r.classList.contains('is-expanded'); });
      toggleAllBtn.textContent = anyExpanded ? 'Collapse All' : 'Expand All';
    }

    toggleAllBtn.addEventListener('click', function () {
      var allExpanded = groupRows.every(function (r) { return r.classList.contains('is-expanded'); });
      var expand = !allExpanded;
      groupRows.forEach(function (r) { r.classList.toggle('is-expanded', expand); });
      allCompanyRows.forEach(function (r) { r.classList.toggle('is-expanded', expand); });
      updateToggleAllText();
    });

    // ── Legend
    var legendPositions = [
      'Core', 'Challenger', 'Niche', 'Strategic Bet',
      'Legacy Extending', 'Prestige', 'Distressed', 'Geographic Specialist',
    ];
    legendPositions.forEach(function (pos) {
      var color = POSITION_COLORS[pos];
      if (!color) return;
      var item = document.createElement('div');
      item.className = 'coverage-legend-item';
      item.innerHTML =
        '<span class="coverage-legend-dot" style="background:' + color + '"></span>' +
        '<span>' + pos + '</span>';
      legendEl.appendChild(item);
    });
  }

  // ── Landing nav toggle ─────────────────────────────────────
  document.querySelectorAll('.landing-nav__view').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.landing-nav__view').forEach(function (b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');

      var view = btn.dataset.view;
      document.getElementById('layer-list').style.display    = view === 'index'    ? '' : 'none';
      document.getElementById('coverage-map').style.display  = view === 'coverage' ? '' : 'none';
      if (view === 'coverage') renderCoverageMap();
    });
  });

  // ── Search ─────────────────────────────────────────────────
  function initSearch() {
    var input   = document.getElementById('company-search');
    var results = document.getElementById('search-results');

    function closeResults() {
      results.classList.remove('open');
      results.innerHTML = '';
    }

    input.addEventListener('input', function () {
      var q = input.value.trim().toLowerCase();
      if (!q) { closeResults(); return; }

      var matches = DATA.companies.filter(function (co) {
        return co.company.toLowerCase().includes(q) ||
          (co.key_differentiator || '').toLowerCase().includes(q);
      }).slice(0, 8);

      if (!matches.length) {
        results.innerHTML = '<li class="search-no-results">No companies found</li>';
        results.classList.add('open');
        return;
      }

      results.innerHTML = matches.map(function (co) {
        return '<li class="search-result" role="option">' +
          '<div class="search-result__name">' + esc(co.company) + '</div>' +
          '<div class="search-result__layer">' + esc(co.primary_layer) + '</div>' +
          '</li>';
      }).join('');

      results.querySelectorAll('.search-result').forEach(function (li, i) {
        var co = matches[i];
        li.addEventListener('click', function () {
          var layer = DATA.layers.find(function (l) { return l.name === co.primary_layer; });
          if (!layer) return;
          input.value = '';
          closeResults();
          currentLayer = layer;
          layer.activeFilter = 'all';
          history.pushState({ view: 'layer', layerName: layer.name, filter: 'all' }, '');
          navigateToCompany(co);
        });
      });

      results.classList.add('open');
    });

    // Close dropdown when clicking outside the search widget
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.search-wrap')) closeResults();
    });
  }

  // ── LEVEL 2: Layer ─────────────────────────────────────────
  function navigateToLayer(layer) {
    currentLayer = layer;
    layer.activeFilter = 'all';

    document.getElementById('layer-heading').textContent = layer.name;
    document.getElementById('layer-description').textContent = layer.description;
    document.getElementById('layer-count').textContent = companiesForLayer(layer.name).length + ' companies';

    // Sync pills to activeFilter (works for both fresh nav and popstate restore)
    document.querySelectorAll('.filter-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.filter === layer.activeFilter);
    });

    renderCompanyGrid();
    history.pushState({ view: 'layer', layerName: layer.name, filter: layer.activeFilter }, '');
    showView('layer');
  }

  function getFilteredCompanies() {
    var all = companiesForLayer(currentLayer.name);
    switch (currentLayer.activeFilter) {
      case 'public':
        return all.filter(function (c) { return /^public/i.test(c.public_private || ''); });
      case 'private':
        return all.filter(function (c) { return /^private/i.test(c.public_private || ''); });
      case 'core':
      case 'challenger':
      case 'niche':
        return all.filter(function (c) {
          return (c.competitive_position || '').toLowerCase() === currentLayer.activeFilter;
        });
      default:
        return all;
    }
  }

  function renderCompanyGrid() {
    var wrapper = document.getElementById('company-grid-wrapper');
    var companies = getFilteredCompanies();

    if (companies.length === 0) {
      wrapper.innerHTML = '<p class="empty-state">No companies match this filter.</p>';
      return;
    }

    var grid = document.createElement('div');
    grid.className = 'company-grid';

    companies.forEach(function (co) {
      var card = document.createElement('div');
      card.className = 'company-card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', 'View profile for ' + co.company);

      var html = '<div class="company-card__name">' + esc(co.company) + '</div>';

      if (co.public_private) {
        html += '<div class="company-card__status">' + esc(simplifyStatus(co.public_private)) + '</div>';
      }

      var locParts = [co.hq, co.geographic_coverage].filter(Boolean);
      if (locParts.length) {
        html += '<div class="company-card__location">' + esc(locParts.join(' · ')) + '</div>';
      }

      if (co.competitive_position) {
        html += '<div class="company-card__badge">' + esc(co.competitive_position) + '</div>';
      }

      if (co.key_differentiator) {
        html += '<div class="company-card__differentiator">' + esc(co.key_differentiator) + '</div>';
      }

      if (co.risk_flags) {
        html += '<div class="company-card__risk">' + esc(co.risk_flags) + '</div>';
      }

      if (co.strategic_move) {
        html += '<div class="company-card__strategic">' + esc(co.strategic_move) + '</div>';
      }

      card.innerHTML = html;
      card.addEventListener('click', function () { navigateToCompany(co); });
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigateToCompany(co); }
      });
      grid.appendChild(card);
    });

    wrapper.innerHTML = '';
    wrapper.appendChild(grid);
  }

  // Filter pill events
  document.getElementById('filter-row').addEventListener('click', function (e) {
    var pill = e.target.closest('.filter-pill');
    if (!pill) return;
    currentLayer.activeFilter = pill.dataset.filter;
    document.querySelectorAll('.filter-pill').forEach(function (p) {
      p.classList.toggle('active', p === pill);
    });
    renderCompanyGrid();
    // replaceState: filter change is UI state within the view, not a navigation event.
    // Using replaceState keeps the history stack clean — one entry per layer visit.
    history.replaceState({ view: 'layer', layerName: currentLayer.name, filter: currentLayer.activeFilter }, '');
  });

  // ── LEVEL 3: Company profile ───────────────────────────────
  function simplifyStatus(str) {
    if (!str) return null;
    if (/^public/i.test(str))     return 'Public';
    if (/^private/i.test(str))    return 'Private';
    if (/^acquired/i.test(str)) {
      var m = str.match(/^Acquired\s*\(([^,)]+)/i);
      return m ? 'Acquired — ' + m[1].trim() : 'Acquired';
    }
    if (/^consortium/i.test(str)) return 'Consortium';
    if (/^quasi/i.test(str))      return 'Public Utility';
    return str;
  }

  function profLabel(text) {
    return '<div class="prof-section-label">' + esc(text) + '</div>';
  }

  // ── Asset type explainers (used in Issued Assets section) ───────────────
  var ASSET_TYPE_EXPLAINERS = {
    'token_as_product':       'This company issues the following as financial products. These are not equity instruments.',
    'tokenization_secondary': 'This company touches tokenization as part of its broader infrastructure.',
    'token_is_core':          'This token is the economic mechanism of the network, not a separate financial product.',
    'both':                   'This company issues financial products and operates proprietary blockchain infrastructure.',
  };

  // ── Competitive position definitions (used for tooltip on profile page) ───
  var POSITION_DEFINITIONS = {
    'CORE':             'The default answer when evaluating vendors in this layer. These are the names that appear in every institutional RFP and conversation. You would need a specific reason not to evaluate them.',
    'CHALLENGER':       'Credible and growing, winning clients in specific segments or geographies, but not yet the universal default. Taking market share from Core players in targeted areas.',
    'NICHE':            'Purpose-built for a specific use case, client type, or geography. Not trying to be everything — deeply excellent at one thing. Being niche is a strength, not a weakness.',
    'STRATEGIC BET':    'Value comes primarily from institutional backing and consortium membership rather than pure commercial momentum. Worth watching regardless of current market position.',
    'LEGACY EXTENDING': 'Incumbent traditional finance firms adding digital asset capabilities to existing products. Strong client relationships and regulatory standing, but technology is bolted on rather than native.',
    'PRESTIGE':         'Technically excellent with the highest regulatory credentials, serving a selective and compliance-sensitive client base. Not the default for most firms but the right answer for the most regulated institutions.',
    'DISTRESSED':       'Still operating but has lost meaningful market position or momentum. Worth knowing exists but not a serious consideration for new institutional builds.',
  };

  // ── Live stock price fetch ──────────────────────────────────
  // NOTE: Uses an unofficial Yahoo Finance endpoint (query1.finance.yahoo.com/v8/finance/chart).
  // This is an undocumented internal service — no public API contract, no SLA, no versioning
  // guarantee. The feature degrades gracefully to hidden on any failure. If this app moves to
  // production, replace with a server-side proxy to control the CORS surface and rate limits.
  var PRICE_TTL = 300000; // 5 minutes in ms

  function formatPriceTime(ts) {
    var d    = new Date(ts);
    var h    = d.getHours();
    var m    = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
  }

  async function fetchAndInjectPrice(ticker) {
    var cached   = PRICE_CACHE[ticker];
    var isFresh  = cached && (Date.now() - cached.fetchedAt < PRICE_TTL);
    var data     = cached;      // null, stale, or fresh — resolved below
    var fetchFailed = false;

    if (!isFresh) {
      try {
        // optimization: skip fetch for crypto-formatted tickers; null guards below handle any missed cases
        var res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(ticker));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var json   = await res.json();
        var result = json && json.chart && json.chart.result && json.chart.result[0];
        if (!result) throw new Error('no result');
        var meta  = result.meta;
        var price = meta.regularMarketPrice;
        var prev  = meta.previousClose || meta.chartPreviousClose;
        if (!price || !prev) throw new Error('no price data');
        data = { price: price, change: ((price - prev) / prev) * 100, fetchedAt: Date.now() };
        PRICE_CACHE[ticker] = data;
      } catch (e) {
        if (typeof console !== 'undefined') console.warn('[price fetch]', ticker, e);
        fetchFailed = true;
        // data remains as stale cached value, or null if never fetched
      }
    }

    var el = document.getElementById('prof-price-badge');
    if (!el || el.dataset.ticker !== ticker) return; // user navigated away mid-fetch

    if (!data) return; // first-ever fetch failed — stay hidden, show nothing

    var isStale = fetchFailed && (Date.now() - data.fetchedAt >= PRICE_TTL);
    var inner   = '';

    if (isStale) {
      // Re-fetch failed and cached data is too old to trust — grey dot, no price shown
      inner =
        '<div class="prof-price-main">' +
          '<span class="prof-price-dot prof-price-dot--stale"></span>' +
          '<span class="prof-price-ticker">' + esc(ticker) + '</span>' +
          '<span class="prof-price-unavailable">price unavailable</span>' +
        '</div>' +
        '<span class="prof-price-timestamp">as of ' + formatPriceTime(data.fetchedAt) + '</span>';
    } else {
      var up = data.change >= 0;
      inner =
        '<div class="prof-price-main">' +
          '<span class="prof-price-dot"></span>' +
          '<span class="prof-price-ticker">' + esc(ticker) + '</span>' +
          '<span class="prof-price-value">$' + data.price.toFixed(2) + '</span>' +
          '<span class="prof-price-change ' + (up ? 'prof-price--up' : 'prof-price--down') + '">' +
          (up ? '↑' : '↓') + '\u00A0' + Math.abs(data.change).toFixed(2) + '%</span>' +
        '</div>' +
        '<span class="prof-price-timestamp">as of ' + formatPriceTime(data.fetchedAt) + '</span>';
    }

    el.innerHTML = inner;
    el.classList.add('prof-price-badge--visible');
  }

  // Renders the company profile DOM. Does not push history or change the visible view.
  // Called by navigateToCompany (fresh navigation) and the popstate handler (restore).
  function renderCompanyProfile(co) {
    var funding      = co.funding || {};
    var ticker       = funding.ticker || null;
    var simpleStatus = simplifyStatus(co.public_private);
    var html = '';

    // ── Back
    html += '<button class="back-link prof-back" id="prof-back-btn">← ' + esc(currentLayer.name) + '</button>';

    // ── 1. Header
    html += '<div class="prof-layer-label">' + esc(co.primary_layer) + '</div>';
    html += '<div class="prof-header-row">';
    html +=   '<div class="prof-header-left">';
    html +=     '<h1 class="prof-name">' + esc(co.company) + '</h1>';
    if (ticker) html += '<span class="prof-ticker">' + esc(ticker) + '</span>';
    html +=   '</div>';
    if (simpleStatus) {
      html += '<div class="prof-header-right">';
      html += '<div class="prof-status">' + esc(simpleStatus) + '</div>';
      if (ticker && !ticker.endsWith('-USD')) {
        html += '<div class="prof-price-badge" id="prof-price-badge" data-ticker="' + esc(ticker) + '"></div>';
      }
      html += '</div>';
    }
    html += '</div>';

    // Funding badges — directly below name, sourced from co.funding object
    var fundStats = [];
    var investors = Array.isArray(funding.key_investors) && funding.key_investors.length
      ? funding.key_investors.join(', ') : null;
    if (funding.last_valuation)       fundStats.push({ label: 'Last Valuation', value: funding.last_valuation });
    if (funding.total_funding_raised) fundStats.push({ label: 'Total Raised',   value: funding.total_funding_raised });
    if (funding.last_round) {
      var roundVal = funding.last_round + (funding.last_round_date ? ' · ' + funding.last_round_date : '');
      fundStats.push({ label: 'Last Round', value: roundVal });
    }
    if (investors) fundStats.push({ label: 'Key Investors', value: investors });
    if (fundStats.length) {
      html += '<div class="prof-funding-row">';
      fundStats.forEach(function (s) {
        html += '<div><div class="prof-funding-badge__label">' + esc(s.label) + '</div><div class="prof-funding-badge__value">' + esc(s.value) + '</div></div>';
      });
      html += '</div>';
    }

    // ── 2. Key Differentiator — hero
    if (co.key_differentiator) {
      html += '<div class="prof-differentiator">';
      html += profLabel('Key Differentiator');
      html += '<div class="prof-differentiator__text">' + esc(co.key_differentiator) + '</div>';
      html += '</div>';
    }

    // ── 3. Two-col: Client Profile | Competitive Position
    if (co.client_profile || co.competitive_position) {
      html += '<div class="prof-two-col">';
      html += '<div>';
      if (co.client_profile) {
        html += profLabel('Client Profile');
        html += '<div class="prof-two-col__value">' + esc(co.client_profile) + '</div>';
      }
      html += '</div>';
      html += '<div>';
      if (co.competitive_position) {
        var posDef = POSITION_DEFINITIONS[(co.competitive_position || '').toUpperCase()];
        var posIcon = posDef
          ? '<span class="position-info-icon" aria-label="What does this mean?">i<span class="position-tooltip">' + esc(posDef) + '</span></span>'
          : '';
        html += '<div class="prof-section-label">Competitive Position' + posIcon + '</div>';
        html += '<div><span class="prof-position-badge">' + esc(co.competitive_position) + '</span></div>';
      }
      html += '</div>';
      html += '</div>';
    }

    // ── 4. Three-col: HQ | Coverage | Founded
    var threeCols = [];
    if (co.hq)                  threeCols.push({ label: 'Headquarters',        value: co.hq });
    if (co.geographic_coverage) threeCols.push({ label: 'Geographic Coverage', value: co.geographic_coverage });
    if (co.founded)             threeCols.push({ label: 'Founded',             value: co.founded });
    if (threeCols.length) {
      html += '<div class="prof-three-col">';
      threeCols.forEach(function (c) {
        html += '<div><div class="prof-three-col__label">' + esc(c.label) + '</div><div class="prof-three-col__value">' + esc(c.value) + '</div></div>';
      });
      html += '</div>';
    }

    // ── 5. Regulatory Status — full width
    if (co.regulatory_status) {
      html += '<div class="prof-full">';
      html += profLabel('Regulatory Status');
      html += '<div class="prof-full__value">' + esc(co.regulatory_status) + '</div>';
      html += '</div>';
    }

    // ── 5b. Issued Assets
    var issuedAssets  = co.issued_assets;
    var hasAssets     = issuedAssets && Array.isArray(issuedAssets.assets) && issuedAssets.assets.length > 0;
    var hasTokenNote  = issuedAssets && !!issuedAssets.tokenization_note;
    if (issuedAssets && (hasAssets || hasTokenNote)) {
      var assetExplainer = ASSET_TYPE_EXPLAINERS[issuedAssets.asset_type] || '';
      html += '<div class="prof-full">';
      html += profLabel('Issued Assets');
      if (assetExplainer) {
        html += '<div class="prof-assets-explainer">' + esc(assetExplainer) + '</div>';
      }
      if (hasAssets) {
        issuedAssets.assets.forEach(function (asset) {
          html += '<div class="prof-asset-row">';
          html += '<span class="prof-asset-symbol">' + esc(asset.symbol) + '</span>';
          html += '<div class="prof-asset-body">';
          html += '<div class="prof-asset-name-row">';
          html += '<span class="prof-asset-name">' + esc(asset.name) + '</span>';
          if (asset.type) {
            html += '<span class="prof-asset-type">' + esc(asset.type) + '</span>';
          }
          html += '</div>';
          if (asset.note) {
            html += '<div class="prof-asset-note">' + esc(asset.note) + '</div>';
          }
          html += '</div>';
          html += '</div>';
        });
      }
      if (issuedAssets.tokenization_note) {
        html += '<div class="prof-assets-context">' + esc(issuedAssets.tokenization_note) + '</div>';
      }
      html += '</div>';
    }

    // ── 6. Secondary Layers — pills
    if (co.secondary_layers) {
      var layers = co.secondary_layers.split(',').map(function (l) { return l.trim(); }).filter(Boolean);
      if (layers.length) {
        html += '<div class="prof-full">';
        html += profLabel('Secondary Layers');
        html += '<div class="prof-pills">';
        layers.forEach(function (l) { html += '<span class="prof-pill">' + esc(l) + '</span>'; });
        html += '</div></div>';
      }
    }

    // ── 7. Strategic Move
    if (co.strategic_move) {
      html += '<div class="prof-full">';
      html += profLabel('Strategic Move');
      html += '<div class="prof-strategic__value">' + esc(co.strategic_move) + '</div>';
      html += '</div>';
    }

    // ── 8. Risk Flags — amber accent, only if not null
    if (co.risk_flags) {
      html += '<div class="prof-risk">';
      html += '<div class="prof-risk__label">Risk Flags</div>';
      html += '<div class="prof-risk__text">' + esc(co.risk_flags) + '</div>';
      html += '</div>';
    }

    // ── 9. Why This Matters — renders if any audience field exists
    var audiences = [
      { key: 'for_broker_dealers', label: 'For Broker-Dealers' },
      { key: 'for_wealth_firms',   label: 'For Wealth Firms' },
      { key: 'for_exchanges',      label: 'For Exchanges' },
    ].filter(function (a) { return co[a.key]; });
    if (audiences.length) {
      html += '<div class="prof-why">';
      html += '<div class="prof-section-label">Why This Matters</div>';
      audiences.forEach(function (a) {
        html += '<div class="prof-why__row">';
        html += '<div class="prof-why__audience">' + esc(a.label) + '</div>';
        html += '<div class="prof-why__text">' + esc(co[a.key]) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    document.getElementById('profile-root').innerHTML = html;
    document.getElementById('prof-back-btn').addEventListener('click', function () {
      history.back();
    });
    if (ticker && !ticker.endsWith('-USD')) {
      fetchAndInjectPrice(ticker);
    }
  }

  function navigateToCompany(co) {
    renderCompanyProfile(co);
    history.pushState({ view: 'company', layerName: currentLayer.name, filter: currentLayer.activeFilter, companyName: co.company }, '');
    showView('company');
  }

  // ── Back navigation ────────────────────────────────────────
  document.getElementById('back-to-landing').addEventListener('click', function () {
    history.back();
  });

  // ── Restore layer view without resetting filter or pushing history ──
  function restoreLayer(layer, filter) {
    currentLayer = layer;
    layer.activeFilter = filter;

    document.getElementById('layer-heading').textContent = layer.name;
    document.getElementById('layer-description').textContent = layer.description;
    document.getElementById('layer-count').textContent = companiesForLayer(layer.name).length + ' companies';

    document.querySelectorAll('.filter-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.filter === filter);
    });

    renderCompanyGrid();
    showView('layer');
  }

  // ── Browser history (popstate) ─────────────────────────────
  window.addEventListener('popstate', function (e) {
    // DATA not yet loaded (fast back during fetch). History position has moved
    // but we have nothing to restore from. Accepted edge case — JSON is small
    // and local; this window is sub-second in practice.
    if (!DATA) return;

    var state = e.state;

    // null state = entry predates replaceState (e.g. cached page from before
    // this fix). Treat as landing.
    if (!state || state.view === 'landing') {
      showView('landing');
      return;
    }

    if (state.view === 'layer') {
      var layer = DATA.layers.find(function (l) { return l.name === state.layerName; });
      if (!layer) { showView('landing'); return; }
      restoreLayer(layer, state.filter || 'all');
      return;
    }

    if (state.view === 'company') {
      var layer = DATA.layers.find(function (l) { return l.name === state.layerName; });
      var co    = DATA.companies.find(function (c) { return c.company === state.companyName; });
      if (!layer || !co) { showView('landing'); return; }
      currentLayer = layer;
      layer.activeFilter = state.filter || 'all';
      renderCompanyProfile(co);
      showView('company');
      return;
    }
  });

  // ── Boot ───────────────────────────────────────────────────
  // Tag the initial history entry synchronously before any async work.
  // Note: deep links (direct URLs to a layer or company) are not supported —
  // users arriving via a bookmarked in-app URL will see the landing page.
  history.replaceState({ view: 'landing' }, '');
  init();

}());
</script>
